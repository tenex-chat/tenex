[package]
name = "tenex-agent"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "tenex-agent"
path = "src/main.rs"

[dependencies]
rig-core = "0.35"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "2"
nostr = "0.44"
glob = "0.3"
walkdir = "2"
regex = "1"
dirs-next = "2"
