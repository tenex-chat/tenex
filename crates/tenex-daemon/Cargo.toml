[package]
name = "tenex-daemon"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
hex = "0.4"
libc = "0.2"
secp256k1 = "0.31"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2"
time = { version = "0.3", features = ["formatting", "macros"] }
tungstenite = { version = "0.29", features = ["rustls-tls-native-roots"] }
url = "2.5"
